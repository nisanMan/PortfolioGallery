<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisan Sher Portfolio Gallery</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: auto;
            position: relative;
        }

        h1 {
            text-align: center;
            color: (0,0,0);
            font-family: 'Arial', sans-serif;
            font-size: 72px;
        }

        h2 {
            text-align: center;
            color: (0,0,0);
            font-family: 'Arial', sans-serif;
            font-size: 48px;
            margin-top: 40px;
            margin-bottom: 10px;

        }

        .container {
            display: flex;
        }

        .button-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            font-size: 30px;

        }

        .button {
            display: inline-block;
            padding: 15px 30px;
            border-radius: 50px; /* Make it rounded */
            background-color: #82d9f3; /* Change color as needed */
            color: rgb(0, 0, 0);
            text-decoration: none;
            transition: background-color 0.3s;
            font-family: 'Arial', sans-serif;
            

            margin-right: 10px; /* Add margin between buttons */
        }

        .button:last-child {
            margin-right: 0; /* Remove margin from the last button */
        }

        .button:hover {
            background-color: #0056b3; /* Change color on hover */
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        figure {
            margin: 0;
            text-align: center;
        }

        img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            margin: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: transform 0.3s;
            cursor: pointer;
        }

        img:hover {
            transform: scale(1.1);
        }

        figcaption {
            font-size: 16px;
            color: #333;
            margin-top: 5px;
            font-size: 22px;
            font-family: 'Arial', sans-serif;


        }

        /* Background with floating shapes */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent 99%, #0000FF 1%);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
